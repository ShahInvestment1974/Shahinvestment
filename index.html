<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111111">
<meta name="description" content="Care Capital Plan A - Client Management">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CareCapital">
<title>Care Capital</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeece8;
    --text: #111111;
    --text2: #666666;
    --text3: #999999;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.2);
    --green: #1a7a4a;
    --green-bg: #eaf3de;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #222222;
      --bg3: #2a2a2a;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666666;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --green: #5dcaa5;
      --green-bg: #04342c;
      --red: #f09595;
      --red-bg: #501313;
      --amber: #ef9f27;
      --amber-bg: #412402;
      --blue: #85b7eb;
      --blue-bg: #042c53;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  
  /* HEADER */
  .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-title { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 11px; color: var(--text2); }
  .sync-btn { padding: 6px 12px; border: 1px solid var(--border2); border-radius: 20px; background: var(--bg2); color: var(--text); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .sync-btn:active { opacity: 0.7; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 10px; cursor: pointer; color: var(--text3); font-size: 10px; gap: 3px; }
  .nav-item.active { color: var(--text); }
  .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .nav-item.active svg { stroke-width: 2.2; }

  /* MAIN CONTENT */
  .main { padding: 16px; padding-bottom: 80px; max-width: 800px; margin: 0 auto; }
  .tab { display: none; }
  .tab.active { display: block; }

  /* CARDS */
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

  /* METRICS */
  .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 12px; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 600; }
  .metric-value.green { color: var(--green); }
  .metric-value.amber { color: var(--amber); }
  .metric-value.small { font-size: 15px; }

  /* SLAB SECTIONS */
  .slab-card { background: var(--bg2); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
  .slab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .slab-name { font-size: 13px; font-weight: 500; }
  .slab-total { font-size: 14px; font-weight: 600; color: var(--green); }
  .slab-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-top: 1px solid var(--border); font-size: 13px; }
  .slab-row-name { color: var(--text); }
  .slab-row-amount { color: var(--text2); font-weight: 500; }

  /* CLIENT LIST */
  .client-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .client-card.alert { border-color: var(--red); background: var(--red-bg); }
  .client-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .client-cert { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .client-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .chip { font-size: 11px; background: var(--bg2); color: var(--text2); padding: 3px 8px; border-radius: 20px; }
  .chip.green { background: var(--green-bg); color: var(--green); }
  .chip.red { background: var(--red-bg); color: var(--red); }
  .chip.amber { background: var(--amber-bg); color: var(--amber); }
  .progress-wrap { margin-top: 6px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .progress-bg { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s; }
  .delete-btn { float: right; background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 4px 8px; color: var(--red); cursor: pointer; font-size: 12px; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
  .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 14px; }
  .form-input:focus { outline: none; border-color: var(--blue); }
  .auto-preview { background: var(--bg2); border-radius: var(--radius); padding: 12px; margin-bottom: 16px; }
  .auto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .auto-item-label { font-size: 11px; color: var(--text2); }
  .auto-item-value { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .btn { display: block; width: 100%; padding: 12px; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; text-align: center; border: none; }
  .btn-primary { background: var(--text); color: var(--bg); }
  .btn-secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }
  .btn:active { opacity: 0.8; }

  /* SEARCH */
  .search-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border2); border-radius: 24px; background: var(--bg2); color: var(--text); font-size: 14px; margin-bottom: 16px; }
  .search-input:focus { outline: none; border-color: var(--blue); }

  /* SECTION TITLE */
  .section-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ALERT BOX */
  .alert-box { background: var(--red-bg); border: 1px solid var(--red); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; color: var(--red); margin-bottom: 10px; }

  /* PRINT */
  .print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .print-table th { background: var(--bg2); padding: 8px; text-align: left; border: 1px solid var(--border); font-weight: 500; }
  .print-table td { padding: 7px 8px; border: 1px solid var(--border); }
  .print-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; font-weight: 600; font-size: 14px; border-top: 2px solid var(--border2); margin-top: 8px; }

  /* GRAND TOTAL BAR */
  .grand-total { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .grand-total-label { font-size: 13px; font-weight: 500; color: var(--text2); }
  .grand-total-value { font-size: 20px; font-weight: 700; color: var(--green); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

  /* TOAST */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* LOGIN SCREEN */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; text-align: center; }
  .login-logo { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .login-sub { color: var(--text2); margin-bottom: 32px; font-size: 15px; }
  .login-btn { background: #4285f4; color: white; border: none; border-radius: var(--radius); padding: 14px 28px; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .login-btn img { width: 20px; height: 20px; }
  .login-note { font-size: 12px; color: var(--text3); margin-top: 20px; }

  @media print {
    .header, .bottom-nav, .btn, .delete-btn, .sync-btn { display: none !important; }
    .main { padding-bottom: 0; }
    body { background: white; color: black; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-logo">Care Capital</div>
  <div class="login-sub">Plan A — Client Management</div>
  <button class="login-btn" onclick="signIn()">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.2 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c10.8 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36 24 36c-5.2 0-9.6-2.7-11.3-6.8l-6.6 5.1C9.5 39.5 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.3-4.4 5.7l6.2 5.2C40.9 35.4 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
    Google se Login Karo
  </button>
  <div class="login-note">Data Google Drive mein save hoga</div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="header">
    <div>
      <div class="header-title">Care Capital</div>
      <div class="header-sub" id="header-date"></div>
    </div>
    <button class="sync-btn" onclick="syncData()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Sync
    </button>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="tab active">
      <div class="metric-grid" id="summary-metrics"></div>
      <div class="section-title" id="month-title"></div>
      <div id="slab-sections"></div>
    </div>

    <!-- CLIENTS -->
    <div id="tab-clients" class="tab">
      <div class="section-title">Active Clients</div>
      <div id="maturity-alerts"></div>
      <div id="clients-list"></div>
    </div>

    <!-- ADD CLIENT -->
    <div id="tab-add" class="tab">
      <div class="section-title">Naya Client Add Karo</div>
      <div class="form-group">
        <label class="form-label">Certificate Number</label>
        <input class="form-input" id="f-cert" type="text" placeholder="e.g. CC-2026-001">
      </div>
      <div class="form-group">
        <label class="form-label">Client Name</label>
        <input class="form-input" id="f-name" type="text" placeholder="Poora naam">
      </div>
      <div class="form-group">
        <label class="form-label">Investment Date</label>
        <input class="form-input" id="f-invdate" type="date" oninput="calcPreview()">
      </div>

        <label class="form-label">Plan Amount (₹)</label>
        <input class="form-input" id="f-amount" type="number" placeholder="e.g. 500000" oninput="calcPreview()">
      </div>

        <div class="auto-grid">
          <div><div class="auto-item-label">Monthly Return</div><div class="auto-item-value" id="prev-monthly">—</div></div>
          <div><div class="auto-item-label">Total Months</div><div class="auto-item-value" id="prev-months">—</div></div>
          <div><div class="auto-item-label">Payment Slab</div><div class="auto-item-value" id="prev-slab">—</div></div>
          <div><div class="auto-item-label">First Payment</div><div class="auto-item-value" id="prev-first">—</div></div>
          <div><div class="auto-item-label">Months Paid</div><div class="auto-item-value" id="prev-paid">—</div></div>
          <div><div class="auto-item-label">Months Left</div><div class="auto-item-value" id="prev-left">—</div></div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addClient()">Client Add Karo</button>
      <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
    </div>

    <!-- SEARCH -->
    <div id="tab-search" class="tab">
      <input class="search-input" id="search-input" type="text" placeholder="Naam ya cert number se dhundo..." oninput="doSearch()">
      <div id="search-results"></div>
    </div>

    <!-- COMPLETED -->
    <div id="tab-completed" class="tab">
      <div class="section-title">Completed Clients</div>
      <div id="completed-list"></div>
    </div>

    <!-- PRINT -->
    <div id="tab-print" class="tab">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin:0" id="print-title"></div>
        <button onclick="window.print()" style="padding:8px 16px;border:1px solid var(--border2);border-radius:20px;background:var(--bg2);color:var(--text);cursor:pointer;font-size:13px">Print</button>
      </div>
      <div id="print-content"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showTab('dashboard',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Dashboard</span>
    </div>
    <div class="nav-item" onclick="showTab('clients',this)">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Clients</span>
    </div>

      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Add</span>
    </div>
    <div class="nav-item" onclick="showTab('search',this)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-item" onclick="showTab('print',this)">
      <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      <span>Print</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const GDRIVE_FILE_NAME = 'carecapital_data.json';
const CLIENT_ID = '697245383588-aahmqtu2q9n14p45dvfp0gdfn07og613.apps.googleusercontent.com'; // Will be replaced
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SLAB_TABLE = [
  [100000,5264,38],[200000,10527,38],[300000,15790,38],[400000,21053,38],
  [500000,27778,36],[600000,33334,36],[700000,38889,36],[800000,44445,36],[900000,50000,36],
  [1000000,58824,34],[1100000,64706,34],[1200000,70589,34],[1300000,76471,34],[1400000,82353,34],
  [1500000,93750,32]
];

let clients = [];
let tokenClient = null;
let accessToken = null;
let driveFileId = null;

// ===== INIT =====
window.onload = function() {
  const today = new Date();
  document.getElementById('header-date').textContent = today.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('month-title').textContent = MONTHS[today.getMonth()]+' '+today.getFullYear()+' — Upcoming Payments';
  document.getElementById('print-title').textContent = 'Monthly Report — '+MONTHS[today.getMonth()]+' '+today.getFullYear();
  
  // Load from localStorage first (offline support)
  const local = localStorage.getItem('cc_clients');
  if(local) clients = JSON.parse(local);
  
  // Check if already signed in
  const token = localStorage.getItem('cc_token');
  if(token) {
    accessToken = token;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll();
    loadFromDrive();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
};

// ===== GOOGLE AUTH =====
function signIn() {
  // Initialize Google Identity Services
  if(typeof google === 'undefined') {
    showToast('Google SDK load ho raha hai...');
    setTimeout(signIn, 1000);
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (response) => {
      if(response.access_token) {
        accessToken = response.access_token;
        localStorage.setItem('cc_token', accessToken);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        renderAll();
        loadFromDrive();
        showToast('Login successful!');
      }
    }
  });
  tokenClient.requestAccessToken();
}

// ===== GOOGLE DRIVE =====
async function loadFromDrive() {
  if(!accessToken) return;
  try {
    // Find file
    const res = await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name="'+GDRIVE_FILE_NAME+'"', {
      headers: { 'Authorization': 'Bearer '+accessToken }
    });
    const data = await res.json();
    if(data.files && data.files.length > 0) {
      driveFileId = data.files[0].id;
      const fileRes = await fetch('https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media', {
        headers: { 'Authorization': 'Bearer '+accessToken }
      });
      const json = await fileRes.json();
      if(json.clients) {
        clients = json.clients;
        localStorage.setItem('cc_clients', JSON.stringify(clients));
        renderAll();
        showToast('Data sync ho gaya!');
      }
    }
  } catch(e) {
    showToast('Offline mode — local data use ho raha hai');
  }
}

async function saveToDrive() {
  if(!accessToken) {
    localStorage.setItem('cc_clients', JSON.stringify(clients));
    showToast('Local mein save ho gaya');
    return;
  }
  const payload = JSON.stringify({ clients, updated: new Date().toISOString() });
  try {
    if(driveFileId) {
      await fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media', {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer '+accessToken, 'Content-Type': 'application/json' },
        body: payload
      });
    } else {
      const meta = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer '+accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: GDRIVE_FILE_NAME, parents: ['appDataFolder'] })
      });
      const metaData = await meta.json();
      driveFileId = metaData.id;
      await fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media', {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer '+accessToken, 'Content-Type': 'application/json' },
        body: payload
      });
    }
    localStorage.setItem('cc_clients', JSON.stringify(clients));
    showToast('Drive mein save ho gaya ✓');
  } catch(e) {
    localStorage.setItem('cc_clients', JSON.stringify(clients));
    showToast('Local save, Drive sync baad mein');
  }
}

function syncData() {
  loadFromDrive();
  showToast('Syncing...');
}

// ===== CALCULATIONS =====
function getSlabInfo(amount) {
  if(amount > 1500000) return { monthly: Math.round(amount*2/32), totalMonths: 32 };
  const row = SLAB_TABLE.find(r => r[0] === amount);
  if(row) return { monthly: row[1], totalMonths: row[2] };
  const nearest = SLAB_TABLE.reduce((p,c) => Math.abs(c[0]-amount)<Math.abs(p[0]-amount)?c:p);
  return { monthly: nearest[1], totalMonths: nearest[2] };
}

function getPaymentSlab(dateStr) {
  const day = new Date(dateStr).getDate();
  if(day>=1&&day<=10) return '1-10';
  if(day>=11&&day<=20) return '11-20';
  return '21-30';
}

function getFirstPayment(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDate(), m = d.getMonth(), y = d.getFullYear();
  if(day<=10) { const nm=m+1>11?0:m+1, ny=m+1>11?y+1:y; return{month:nm,year:ny}; }
  if(day<=20) { const nm=m+1>11?0:m+1, ny=m+1>11?y+1:y; return{month:nm,year:ny}; }
  const nm=m+2>11?m+2-12:m+2, ny=m+2>11?y+1:y;
  return{month:nm,year:ny};
}

function getMonthsPaid(fpm, fpy, slab) {
  const today = new Date();
  const td=today.getDate(), tm=today.getMonth(), ty=today.getFullYear();
  let cutoff = slab==='1-10'?20 : slab==='11-20'?30 : 10;
  let cm=tm, cy=ty;
  if(td<cutoff){ cm=tm-1<0?11:tm-1; cy=tm-1<0?ty-1:ty; }
  const diff=(cy*12+cm)-(fpy*12+fpm)+1;
  return Math.max(0,diff);
}

function fmt(n){ return Math.round(n).toLocaleString('en-IN'); }
function mLabel(m,y){ return MONTHS[m]+' '+y; }

// ===== FORM =====
function calcPreview() {
  const amount=parseFloat(document.getElementById('f-amount').value)||0;
  const dateStr=document.getElementById('f-invdate').value;
  if(!amount||!dateStr){document.getElementById('auto-preview').style.display='none';return;}
  document.getElementById('auto-preview').style.display='block';
  const{monthly,totalMonths}=getSlabInfo(amount);
  const slab=getPaymentSlab(dateStr);
  const fp=getFirstPayment(dateStr);
  const paid=getMonthsPaid(fp.month,fp.year,slab);
  const left=Math.max(0,totalMonths-paid);
  const slabMap={'1-10':'15–20 (Next Month)','11-20':'25–30 (Next Month)','21-30':'5–10 (Next to Next)'};
  document.getElementById('prev-monthly').textContent='₹'+fmt(monthly);
  document.getElementById('prev-months').textContent=totalMonths;
  document.getElementById('prev-slab').textContent=slabMap[slab];
  document.getElementById('prev-first').textContent=mLabel(fp.month,fp.year);
  document.getElementById('prev-paid').textContent=paid;
  document.getElementById('prev-left').textContent=left;
}

function addClient() {
  const cert=document.getElementById('f-cert').value.trim();
  const name=document.getElementById('f-name').value.trim();
  const dateStr=document.getElementById('f-invdate').value;
  const amount=parseFloat(document.getElementById('f-amount').value)||0;
  if(!cert||!name||!dateStr||!amount){showToast('Saare fields bharein');return;}
  const{monthly,totalMonths}=getSlabInfo(amount);
  const slab=getPaymentSlab(dateStr);
  const fp=getFirstPayment(dateStr);
  clients.push({cert,name,invDate:dateStr,amount,monthly,totalMonths,slab,firstPaymentMonth:fp.month,firstPaymentYear:fp.year});
  saveToDrive();
  clearForm();
  renderAll();
  showTab('clients',document.querySelectorAll('.nav-item')[1]);
  showToast('Client add ho gaya!');
}

function clearForm() {
  ['f-cert','f-name','f-invdate','f-amount'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('auto-preview').style.display='none';
}

function deleteClient(i) {
  if(confirm(clients[i].name+' ko delete karna chahte hain?')){
    clients.splice(i,1); saveToDrive(); renderAll(); showToast('Client delete ho gaya');
  }
}

// ===== STATUS =====
function getStatus(c) {
  const paid=getMonthsPaid(c.firstPaymentMonth,c.firstPaymentYear,c.slab);
  const left=Math.max(0,c.totalMonths-paid);
  return{paid,left,completed:left===0};
}

// ===== RENDER =====
function renderDashboard() {
  const active=clients.filter(c=>!getStatus(c).completed);
  const done=clients.filter(c=>getStatus(c).completed);
  const totalInv=clients.reduce((s,c)=>s+c.amount,0);
  const s510=active.filter(c=>c.slab==='21-30');
  const s1520=active.filter(c=>c.slab==='1-10');
  const s2530=active.filter(c=>c.slab==='11-20');
  const t510=s510.reduce((s,c)=>s+c.monthly,0);
  const t1520=s1520.reduce((s,c)=>s+c.monthly,0);
  const t2530=s2530.reduce((s,c)=>s+c.monthly,0);
  const grandTotal=t510+t1520+t2530;

  document.getElementById('summary-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total Clients</div><div class="metric-value">${clients.length}</div></div>
    <div class="metric"><div class="metric-label">Active</div><div class="metric-value green">${active.length}</div></div>
    <div class="metric"><div class="metric-label">Completed</div><div class="metric-value amber">${done.length}</div></div>
    <div class="metric"><div class="metric-label">Total Investment</div><div class="metric-value small">₹${fmt(totalInv)}</div></div>
  `;

  function slabRows(arr) {
    if(!arr.length) return '<div style="font-size:12px;color:var(--text3);padding:6px 0">Koi client nahi</div>';
    return arr.map(c=>`<div class="slab-row"><span class="slab-row-name">${c.name}</span><span class="slab-row-amount">₹${fmt(c.monthly)}</span></div>`).join('');
  }

  document.getElementById('slab-sections').innerHTML=`
    <div class="slab-card">
      <div class="slab-header"><span class="slab-name">5th–10th Payments</span><span class="slab-total">₹${fmt(t510)}</span></div>
      ${slabRows(s510)}
    </div>
    <div class="slab-card">
      <div class="slab-header"><span class="slab-name">15th–20th Payments</span><span class="slab-total">₹${fmt(t1520)}</span></div>
      ${slabRows(s1520)}
    </div>
    <div class="slab-card">
      <div class="slab-header"><span class="slab-name">25th–30th Payments</span><span class="slab-total">₹${fmt(t2530)}</span></div>
      ${slabRows(s2530)}
    </div>
    <div class="grand-total">
      <span class="grand-total-label">Total Monthly Outflow</span>
      <span class="grand-total-value">₹${fmt(grandTotal)}</span>
    </div>
  `;
}

function renderClients() {
  const active=clients.filter(c=>!getStatus(c).completed);
  const alerts=active.filter(c=>{const s=getStatus(c);return s.left<=2&&s.left>0;});
  document.getElementById('maturity-alerts').innerHTML=alerts.map(c=>`<div class="alert-box">⚠️ <strong>${c.name}</strong> — sirf ${getStatus(c).left} month bacha hai!</div>`).join('');
  const slabLabels={'1-10':'15–20th','11-20':'25–30th','21-30':'5–10th'};
  document.getElementById('clients-list').innerHTML=active.length?active.map((c)=>{
    const{paid,left}=getStatus(c);
    const idx=clients.indexOf(c);
    const pct=Math.round(paid/c.totalMonths*100);
    const isAlert=left<=2&&left>0;
    return`<div class="client-card ${isAlert?'alert':''}">
      <button class="delete-btn" onclick="deleteClient(${idx})">Delete</button>
      <div class="client-name">${c.name}</div>
      <div class="client-cert">${c.cert}</div>
      <div class="client-row">
        <span class="chip">₹${fmt(c.amount)}</span>
        <span class="chip green">₹${fmt(c.monthly)}/mo</span>
        <span class="chip">${slabLabels[c.slab]}</span>
      </div>
      <div class="client-row">
        <span class="chip">Paid: ${paid} months</span>
        <span class="chip ${left<=2?'red':'amber'}">Left: ${left} months</span>
        <span class="chip">First: ${mLabel(c.firstPaymentMonth,c.firstPaymentYear)}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>${pct}% complete</span><span>${paid}/${c.totalMonths}</span></div>
        <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join(''):'<div class="empty">Koi active client nahi</div>';
}

function renderCompleted() {
  const done=clients.filter(c=>getStatus(c).completed);
  document.getElementById('completed-list').innerHTML=done.length?done.map(c=>`
    <div class="client-card">
      <div class="client-name">${c.name}</div>
      <div class="client-cert">${c.cert}</div>
      <div class="client-row">
        <span class="chip">₹${fmt(c.amount)}</span>
        <span class="chip">${c.totalMonths} months</span>
        <span class="chip green">Total: ₹${fmt(c.monthly*c.totalMonths)}</span>
      </div>
    </div>`).join(''):'<div class="empty">Koi completed client nahi</div>';
}

function renderPrint() {
  const active=clients.filter(c=>!getStatus(c).completed);
  const slabLabels={'1-10':'15–20th','11-20':'25–30th','21-30':'5–10th'};
  const rows=active.map((c,i)=>{
    const{paid,left}=getStatus(c);
    return`<tr><td>${i+1}</td><td>${c.cert}</td><td>${c.name}</td><td>₹${fmt(c.amount)}</td><td>₹${fmt(c.monthly)}</td><td>${slabLabels[c.slab]}</td><td>${paid}</td><td>${left}</td></tr>`;
  }).join('');
  const total=active.reduce((s,c)=>s+c.monthly,0);
  document.getElementById('print-content').innerHTML=`
    <div style="overflow-x:auto">
    <table class="print-table">
      <thead><tr><th>#</th><th>Cert</th><th>Name</th><th>Plan</th><th>Monthly</th><th>Slab</th><th>Paid</th><th>Left</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="8" style="text-align:center;color:var(--text3)">Koi active client nahi</td></tr>'}</tbody>
    </table></div>
    <div class="print-footer"><span>Total Monthly Outflow</span><span style="color:var(--green)">₹${fmt(total)}</span></div>
  `;
}

function doSearch() {
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const el=document.getElementById('search-results');
  if(!q){el.innerHTML='';return;}
  const found=clients.filter(c=>c.name.toLowerCase().includes(q)||c.cert.toLowerCase().includes(q));
  if(!found.length){el.innerHTML='<div class="empty">Koi nahi mila</div>';return;}
  const slabLabels={'1-10':'15–20th next month','11-20':'25–30th next month','21-30':'5–10th next to next'};
  el.innerHTML=found.map(c=>{
    const{paid,left}=getStatus(c);
    const pct=Math.round(paid/c.totalMonths*100);
    return`<div class="client-card">
      <div class="client-name">${c.name}</div>
      <div class="client-cert">${c.cert} · ${slabLabels[c.slab]}</div>
      <div class="client-row">
        <span class="chip">Plan: ₹${fmt(c.amount)}</span>
        <span class="chip green">₹${fmt(c.monthly)}/mo</span>
      </div>
      <div style="display:flex;gap:20px;margin:8px 0">
        <div><div style="font-size:11px;color:var(--text2)">Months Paid</div><div style="font-size:20px;font-weight:700">${paid}</div></div>
        <div><div style="font-size:11px;color:var(--text2)">Months Left</div><div style="font-size:20px;font-weight:700;color:${left<=2?'var(--red)':'var(--text)'}">${left}</div></div>
        <div><div style="font-size:11px;color:var(--text2)">Total Paid</div><div style="font-size:20px;font-weight:700">₹${fmt(c.monthly*paid)}</div></div>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderAll(){renderDashboard();renderClients();renderCompleted();renderPrint();}

function showTab(name,el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(el) el.classList.add('active');
  if(name==='dashboard')renderDashboard();
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
