<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a56db">
<meta name="description" content="Shah Investment - Client Management">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shah Investment">
<title>Shah Investment</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --primary: #1a56db;
    --primary-dark: #1240a8;
    --primary-light: #e8f0fe;
    --primary-mid: #c3d4fa;
    --bg: #ffffff;
    --bg2: #f0f4ff;
    --bg3: #e4ecfe;
    --text: #111827;
    --text2: #4b5563;
    --text3: #9ca3af;
    --border: rgba(26,86,219,0.12);
    --border2: rgba(26,86,219,0.25);
    --green: #047857;
    --green-bg: #d1fae5;
    --red: #b91c1c;
    --red-bg: #fee2e2;
    --amber: #92400e;
    --amber-bg: #fef3c7;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 4px rgba(26,86,219,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* HEADER */
  .header { background: var(--primary); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; height: 56px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon { width: 32px; height: 32px; border-radius: 8px; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary); font-size: 14px; }
  .header-icon img { width: 100%; height: 100%; object-fit: cover; }
  .header-title { font-size: 16px; font-weight: 700; color: white; }
  .header-sub { font-size: 10px; color: rgba(255,255,255,0.7); }
  .sync-btn { padding: 6px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; background: rgba(255,255,255,0.15); color: white; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .sync-btn:active { opacity: 0.7; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 10px; cursor: pointer; color: var(--text3); font-size: 10px; gap: 3px; }
  .nav-item.active { color: var(--primary); }
  .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .nav-item.active svg { stroke-width: 2.2; }

  /* MAIN */
  .main { padding: 16px; padding-bottom: 80px; max-width: 800px; margin: 0 auto; }
  .tab { display: none; }
  .tab.active { display: block; }

  /* METRIC GRID */
  .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; border: 1px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .metric-value.blue { color: var(--primary); }
  .metric-value.green { color: var(--green); }
  .metric-value.amber { color: var(--amber); }
  .metric-value.small { font-size: 15px; }

  /* SLAB */
  .slab-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .slab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .slab-name { font-size: 13px; font-weight: 600; color: var(--primary); }
  .slab-total { font-size: 15px; font-weight: 700; color: var(--primary); }
  .slab-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-top: 1px solid var(--border); font-size: 13px; }

  /* CLIENT CARD */
  .client-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .client-card.alert { border-color: var(--red); background: var(--red-bg); }
  .client-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .client-cert { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .chip-blue { background: var(--primary-light); color: var(--primary); }
  .chip-green { background: var(--green-bg); color: var(--green); }
  .chip-amber { background: var(--amber-bg); color: var(--amber); }
  .chip-red { background: var(--red-bg); color: var(--red); }
  .chip-gray { background: var(--bg2); color: var(--text2); }
  .progress-wrap { margin-top: 8px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .progress-bg { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s; }
  .delete-btn { float: right; background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 4px 10px; color: var(--red); cursor: pointer; font-size: 12px; }

  /* FORM */
  .section-title { font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.6px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; }
  .form-input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 14px; }
  .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  .auto-preview { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; }
  .auto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .auto-item-label { font-size: 11px; color: var(--text2); }
  .auto-item-value { font-size: 15px; font-weight: 700; color: var(--primary); margin-top: 2px; }
  .btn { display: block; width: 100%; padding: 13px; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; border: none; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border2); margin-top: 8px; }
  .btn:active { opacity: 0.85; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-input { width: 100%; padding: 11px 14px 11px 38px; border: 1.5px solid var(--border2); border-radius: 24px; background: var(--bg2); color: var(--text); font-size: 14px; }
  .search-input:focus { outline: none; border-color: var(--primary); background: white; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

  /* GRAND TOTAL */
  .grand-total { background: var(--primary); border-radius: var(--radius); padding: 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .grand-total-label { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); }
  .grand-total-value { font-size: 22px; font-weight: 800; color: white; }

  /* ALERT */
  .alert-box { background: var(--red-bg); border: 1px solid var(--red); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; color: var(--red); margin-bottom: 10px; font-weight: 500; }

  /* PRINT TABLE */
  .print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .print-table th { background: var(--bg2); padding: 8px; text-align: left; border: 1px solid var(--border); font-weight: 600; color: var(--primary); }
  .print-table td { padding: 7px 8px; border: 1px solid var(--border); }
  .print-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; font-weight: 700; font-size: 15px; border-top: 2px solid var(--primary); margin-top: 8px; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

  /* TOAST */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 24px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; font-weight: 500; }
  .toast.show { opacity: 1; }

  /* LOGIN */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; text-align: center; background: linear-gradient(160deg, var(--primary) 0%, #1240a8 100%); }
  .login-logo-wrap { width: 72px; height: 72px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .login-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .login-logo-text { font-size: 28px; font-weight: 800; color: var(--primary); }
  .login-title { font-size: 24px; font-weight: 800; color: white; margin-bottom: 6px; }
  .login-sub { color: rgba(255,255,255,0.75); margin-bottom: 36px; font-size: 15px; }
  .login-btn { background: white; color: var(--primary); border: none; border-radius: var(--radius); padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
  .login-btn:active { opacity: 0.9; }
  .login-note { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 20px; }

  @media print {
    .header, .bottom-nav, .btn, .delete-btn, .sync-btn { display: none !important; }
    .main { padding-bottom: 0; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-logo-wrap">
    <img id="login-icon" src="icon-192.png" onerror="this.style.display='none';document.getElementById('login-icon-text').style.display='block'" alt="SI">
    <span id="login-icon-text" style="display:none;font-size:22px;font-weight:800;color:var(--primary)">SI</span>
  </div>
  <div class="login-title">Shah Investment</div>
  <div class="login-sub">Client Management System</div>
  <button class="login-btn" onclick="signIn()">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.2 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c10.8 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36 24 36c-5.2 0-9.6-2.7-11.3-6.8l-6.6 5.1C9.5 39.5 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.3-4.4 5.7l6.2 5.2C40.9 35.4 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
    Google se Login Karo
  </button>
  <div class="login-note">Data Google Drive mein save hoga</div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <img src="icon-192.png" onerror="this.style.display='none';this.parentNode.textContent='SI'" alt="SI">
      </div>
      <div>
        <div class="header-title">Shah Investment</div>
        <div class="header-sub" id="header-date"></div>
      </div>
    </div>
    <button class="sync-btn" onclick="syncData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Sync
    </button>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="tab active">
      <div class="metric-grid" id="summary-metrics"></div>
      <div class="section-title" id="month-title"></div>
      <div id="slab-sections"></div>
    </div>

    <!-- CLIENTS -->
    <div id="tab-clients" class="tab">
      <div class="section-title">Active Clients</div>
      <div id="maturity-alerts"></div>
      <div id="clients-list"></div>
    </div>

    <!-- ADD CLIENT -->
    <div id="tab-add" class="tab">
      <div class="section-title">Naya Client Add Karo</div>
      <div class="form-group">
        <label class="form-label">Certificate Number</label>
        <input class="form-input" id="f-cert" type="text" placeholder="e.g. SI-2026-001">
      </div>
      <div class="form-group">
        <label class="form-label">Client Name</label>
        <input class="form-input" id="f-name" type="text" placeholder="Poora naam">
      </div>
      <div class="form-group">
        <label class="form-label">Investment Date</label>
        <input class="form-input" id="f-invdate" type="date" oninput="calcPreview()">
      </div>
      <div class="form-group">
        <label class="form-label">Plan Amount (₹)</label>
        <input class="form-input" id="f-amount" type="number" placeholder="e.g. 500000" oninput="calcPreview()">
      </div>
      <div id="auto-preview" class="auto-preview" style="display:none">
        <div style="font-size:12px;font-weight:600;color:var(--primary);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Auto-Calculated</div>
        <div class="auto-grid">
          <div><div class="auto-item-label">Monthly Return</div><div class="auto-item-value" id="prev-monthly">—</div></div>
          <div><div class="auto-item-label">Total Months</div><div class="auto-item-value" id="prev-months">—</div></div>
          <div><div class="auto-item-label">Payment Slab</div><div class="auto-item-value" id="prev-slab">—</div></div>
          <div><div class="auto-item-label">First Payment</div><div class="auto-item-value" id="prev-first">—</div></div>
          <div><div class="auto-item-label">Months Paid</div><div class="auto-item-value" id="prev-paid">—</div></div>
          <div><div class="auto-item-label">Months Left</div><div class="auto-item-value" id="prev-left">—</div></div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addClient()">Client Add Karo</button>
      <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
    </div>

    <!-- SEARCH -->
    <div id="tab-search" class="tab">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="search-input" type="text" placeholder="Naam ya cert number se dhundo..." oninput="doSearch()">
      </div>
      <div id="search-results"></div>
    </div>

    <!-- COMPLETED -->
    <div id="tab-completed" class="tab">
      <div class="section-title">Completed Clients</div>
      <div id="completed-list"></div>
    </div>

    <!-- PRINT -->
    <div id="tab-print" class="tab">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin:0" id="print-title"></div>
        <button onclick="window.print()" style="padding:8px 16px;border:1.5px solid var(--primary);border-radius:20px;background:var(--primary-light);color:var(--primary);cursor:pointer;font-size:13px;font-weight:600">Print</button>
      </div>
      <div id="print-content"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showTab('dashboard',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </div>
    <div class="nav-item" onclick="showTab('clients',this)">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Clients</span>
    </div>
    <div class="nav-item" onclick="showTab('add',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Add</span>
    </div>
    <div class="nav-item" onclick="showTab('search',this)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-item" onclick="showTab('print',this)">
      <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      <span>Print</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GDRIVE_FILE_NAME = 'shahinvestment_data.json';
const CLIENT_ID = '697245383588-aahmqtu2q9n14p45dvfp0gdfn07og613.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SLAB_TABLE = [
  [100000,5264,38],[200000,10527,38],[300000,15790,38],[400000,21053,38],
  [500000,27778,36],[600000,33334,36],[700000,38889,36],[800000,44445,36],[900000,50000,36],
  [1000000,58824,34],[1100000,64706,34],[1200000,70589,34],[1300000,76471,34],[1400000,82353,34],
  [1500000,93750,32]
];

let clients = [], accessToken = null, driveFileId = null;

window.onload = function() {
  const today = new Date();
  document.getElementById('header-date').textContent = today.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('month-title').textContent = MONTHS[today.getMonth()]+' '+today.getFullYear()+' — Upcoming Payments';
  document.getElementById('print-title').textContent = 'Monthly Report — '+MONTHS[today.getMonth()]+' '+today.getFullYear();
  const local = localStorage.getItem('si_clients');
  if(local) clients = JSON.parse(local);
  // Always request fresh token - cached tokens expire after 1 hour
  const hasLoggedInBefore = localStorage.getItem('si_logged_in');
  if(hasLoggedInBefore) {
    // Auto re-authenticate silently
    document.getElementById('login-screen').style.display = 'flex';
    // Try silent login
    setTimeout(() => {
      if(typeof google !== 'undefined') {
        const tc = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID, scope: SCOPES,
          prompt: '',
          callback: (r) => {
            if(r.access_token) {
              accessToken = r.access_token;
              document.getElementById('login-screen').style.display = 'none';
              document.getElementById('app').style.display = 'block';
              renderAll(); loadFromDrive();
            } else {
              document.getElementById('login-screen').style.display = 'flex';
            }
          }
        });
        tc.requestAccessToken();
      }
    }, 1000);
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
};

function signIn() {
  if(typeof google === 'undefined') { showToast('Loading...'); setTimeout(signIn,1000); return; }
  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: (r) => {
      if(r.access_token) {
        accessToken = r.access_token;
        localStorage.setItem('si_logged_in', '1');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        renderAll(); loadFromDrive(); showToast('Login successful! ✓');
      }
    }
  }).requestAccessToken();
}

async function loadFromDrive() {
  if(!accessToken) return;
  try {
    const res = await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name="'+GDRIVE_FILE_NAME+'"', { headers:{'Authorization':'Bearer '+accessToken} });
    const data = await res.json();
    if(data.files && data.files.length > 0) {
      driveFileId = data.files[0].id;
      const fr = await fetch('https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media', { headers:{'Authorization':'Bearer '+accessToken} });
      const json = await fr.json();
      if(json.clients) { clients = json.clients; localStorage.setItem('si_clients', JSON.stringify(clients)); renderAll(); showToast('Sync complete ✓'); }
    }
  } catch(e) { showToast('Offline — local data'); }
}

async function saveToDrive() {
  localStorage.setItem('si_clients', JSON.stringify(clients));
  if(!accessToken) { showToast('Local mein save ho gaya'); return; }
  const payload = JSON.stringify({ clients, updated: new Date().toISOString() });
  try {
    if(driveFileId) {
      await fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media', { method:'PATCH', headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'}, body:payload });
    } else {
      const m = await (await fetch('https://www.googleapis.com/drive/v3/files', { method:'POST', headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'}, body:JSON.stringify({name:GDRIVE_FILE_NAME,parents:['appDataFolder']}) })).json();
      driveFileId = m.id;
      await fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media', { method:'PATCH', headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'}, body:payload });
    }
    showToast('Drive mein save ho gaya ✓');
  } catch(e) { showToast('Local save, Drive sync baad mein'); }
}

function syncData() { loadFromDrive(); showToast('Syncing...'); }

function getSlabInfo(amount) {
  if(amount > 1500000) return { monthly: Math.round(amount*2/32), totalMonths: 32 };
  const row = SLAB_TABLE.find(r=>r[0]===amount);
  if(row) return { monthly:row[1], totalMonths:row[2] };
  const nearest = SLAB_TABLE.reduce((p,c)=>Math.abs(c[0]-amount)<Math.abs(p[0]-amount)?c:p);
  return { monthly:nearest[1], totalMonths:nearest[2] };
}

function getPaymentSlab(dateStr) {
  const day = new Date(dateStr).getDate();
  if(day<=10) return '1-10';
  if(day<=20) return '11-20';
  return '21-30';
}

function getFirstPayment(dateStr) {
  const d=new Date(dateStr), day=d.getDate(), m=d.getMonth(), y=d.getFullYear();
  if(day<=10) { return{month:m+1>11?0:m+1, year:m+1>11?y+1:y}; }
  if(day<=20) { return{month:m+1>11?0:m+1, year:m+1>11?y+1:y}; }
  const nm=m+2>11?m+2-12:m+2; return{month:nm, year:m+2>11?y+1:y};
}

function getMonthsPaid(fpm, fpy, slab) {
  const today=new Date(), td=today.getDate(), tm=today.getMonth(), ty=today.getFullYear();
  const cutoff = slab==='1-10'?20 : slab==='11-20'?30 : 10;
  let cm=tm, cy=ty;
  if(td<cutoff){ cm=tm-1<0?11:tm-1; cy=tm-1<0?ty-1:ty; }
  return Math.max(0,(cy*12+cm)-(fpy*12+fpm)+1);
}

function fmt(n){ return Math.round(n).toLocaleString('en-IN'); }
function mLabel(m,y){ return MONTHS[m]+' '+y; }

function calcPreview() {
  const amount=parseFloat(document.getElementById('f-amount').value)||0;
  const dateStr=document.getElementById('f-invdate').value;
  if(!amount||!dateStr){document.getElementById('auto-preview').style.display='none';return;}
  document.getElementById('auto-preview').style.display='block';
  const{monthly,totalMonths}=getSlabInfo(amount);
  const slab=getPaymentSlab(dateStr);
  const fp=getFirstPayment(dateStr);
  const paid=getMonthsPaid(fp.month,fp.year,slab);
  const left=Math.max(0,totalMonths-paid);
  const slabMap={'1-10':'15–20 (Next Month)','11-20':'25–30 (Next Month)','21-30':'5–10 (Next to Next)'};
  document.getElementById('prev-monthly').textContent='₹'+fmt(monthly);
  document.getElementById('prev-months').textContent=totalMonths;
  document.getElementById('prev-slab').textContent=slabMap[slab];
  document.getElementById('prev-first').textContent=mLabel(fp.month,fp.year);
  document.getElementById('prev-paid').textContent=paid;
  document.getElementById('prev-left').textContent=left;
}

function addClient() {
  const cert=document.getElementById('f-cert').value.trim();
  const name=document.getElementById('f-name').value.trim();
  const dateStr=document.getElementById('f-invdate').value;
  const amount=parseFloat(document.getElementById('f-amount').value)||0;
  if(!cert||!name||!dateStr||!amount){showToast('Saare fields bharein');return;}
  const{monthly,totalMonths}=getSlabInfo(amount);
  const slab=getPaymentSlab(dateStr);
  const fp=getFirstPayment(dateStr);
  clients.push({cert,name,invDate:dateStr,amount,monthly,totalMonths,slab,firstPaymentMonth:fp.month,firstPaymentYear:fp.year});
  saveToDrive(); clearForm(); renderAll();
  showTab('clients',document.querySelectorAll('.nav-item')[1]);
  showToast('Client add ho gaya! ✓');
}

function clearForm() {
  ['f-cert','f-name','f-invdate','f-amount'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('auto-preview').style.display='none';
}

function deleteClient(i) {
  if(confirm(clients[i].name+' ko delete karna chahte hain?')){
    clients.splice(i,1); saveToDrive(); renderAll(); showToast('Client delete ho gaya');
  }
}

function getStatus(c) {
  const paid=getMonthsPaid(c.firstPaymentMonth,c.firstPaymentYear,c.slab);
  const left=Math.max(0,c.totalMonths-paid);
  return{paid,left,completed:left===0};
}

function renderDashboard() {
  const active=clients.filter(c=>!getStatus(c).completed);
  const done=clients.filter(c=>getStatus(c).completed);
  const totalInv=clients.reduce((s,c)=>s+c.amount,0);
  const s510=active.filter(c=>c.slab==='21-30');
  const s1520=active.filter(c=>c.slab==='1-10');
  const s2530=active.filter(c=>c.slab==='11-20');
  const t510=s510.reduce((s,c)=>s+c.monthly,0);
  const t1520=s1520.reduce((s,c)=>s+c.monthly,0);
  const t2530=s2530.reduce((s,c)=>s+c.monthly,0);
  document.getElementById('summary-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total Clients</div><div class="metric-value blue">${clients.length}</div></div>
    <div class="metric"><div class="metric-label">Active</div><div class="metric-value green">${active.length}</div></div>
    <div class="metric"><div class="metric-label">Completed</div><div class="metric-value amber">${done.length}</div></div>
    <div class="metric"><div class="metric-label">Total Investment</div><div class="metric-value small blue">₹${fmt(totalInv)}</div></div>
  `;
  function slabRows(arr) {
    if(!arr.length) return '<div style="font-size:12px;color:var(--text3);padding:6px 0;text-align:center">Koi client nahi</div>';
    return arr.map(c=>`<div class="slab-row"><span>${c.name}</span><span style="font-weight:600;color:var(--primary)">₹${fmt(c.monthly)}</span></div>`).join('');
  }
  document.getElementById('slab-sections').innerHTML=`
    <div class="slab-card"><div class="slab-header"><span class="slab-name">5th–10th Payments</span><span class="slab-total">₹${fmt(t510)}</span></div>${slabRows(s510)}</div>
    <div class="slab-card"><div class="slab-header"><span class="slab-name">15th–20th Payments</span><span class="slab-total">₹${fmt(t1520)}</span></div>${slabRows(s1520)}</div>
    <div class="slab-card"><div class="slab-header"><span class="slab-name">25th–30th Payments</span><span class="slab-total">₹${fmt(t2530)}</span></div>${slabRows(s2530)}</div>
    <div class="grand-total"><span class="grand-total-label">Total Monthly Outflow</span><span class="grand-total-value">₹${fmt(t510+t1520+t2530)}</span></div>
  `;
}

function renderClients() {
  const active=clients.filter(c=>!getStatus(c).completed);
  const alerts=active.filter(c=>{const s=getStatus(c);return s.left<=2&&s.left>0;});
  document.getElementById('maturity-alerts').innerHTML=alerts.map(c=>`<div class="alert-box">⚠️ <strong>${c.name}</strong> — sirf ${getStatus(c).left} month bacha hai!</div>`).join('');
  const slabL={'1-10':'15–20th','11-20':'25–30th','21-30':'5–10th'};
  document.getElementById('clients-list').innerHTML=active.length?active.map(c=>{
    const{paid,left}=getStatus(c); const idx=clients.indexOf(c); const pct=Math.round(paid/c.totalMonths*100);
    return`<div class="client-card ${left<=2&&left>0?'alert':''}">
      <button class="delete-btn" onclick="deleteClient(${idx})">Delete</button>
      <div class="client-name">${c.name}</div>
      <div class="client-cert">${c.cert}</div>
      <div class="chips">
        <span class="chip chip-blue">₹${fmt(c.amount)}</span>
        <span class="chip chip-green">₹${fmt(c.monthly)}/mo</span>
        <span class="chip chip-gray">${slabL[c.slab]}</span>
      </div>
      <div class="chips">
        <span class="chip chip-blue">Paid: ${paid} months</span>
        <span class="chip ${left<=2?'chip-red':'chip-amber'}">Left: ${left} months</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>${pct}% complete</span><span>${paid}/${c.totalMonths}</span></div>
        <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join(''):'<div class="empty">Koi active client nahi</div>';
}

function renderCompleted() {
  const done=clients.filter(c=>getStatus(c).completed);
  document.getElementById('completed-list').innerHTML=done.length?done.map(c=>`
    <div class="client-card">
      <div class="client-name">${c.name}</div>
      <div class="client-cert">${c.cert}</div>
      <div class="chips">
        <span class="chip chip-blue">₹${fmt(c.amount)}</span>
        <span class="chip chip-gray">${c.totalMonths} months</span>
        <span class="chip chip-green">Total: ₹${fmt(c.monthly*c.totalMonths)}</span>
      </div>
    </div>`).join(''):'<div class="empty">Koi completed client nahi</div>';
}

function renderPrint() {
  const active=clients.filter(c=>!getStatus(c).completed);
  const slabL={'1-10':'15–20th','11-20':'25–30th','21-30':'5–10th'};
  const rows=active.map((c,i)=>{const{paid,left}=getStatus(c);return`<tr><td>${i+1}</td><td>${c.cert}</td><td>${c.name}</td><td>₹${fmt(c.amount)}</td><td>₹${fmt(c.monthly)}</td><td>${slabL[c.slab]}</td><td>${paid}</td><td>${left}</td></tr>`;}).join('');
  const total=active.reduce((s,c)=>s+c.monthly,0);
  document.getElementById('print-content').innerHTML=`
    <div style="overflow-x:auto"><table class="print-table">
      <thead><tr><th>#</th><th>Cert</th><th>Name</th><th>Plan</th><th>Monthly</th><th>Slab</th><th>Paid</th><th>Left</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="8" style="text-align:center;color:var(--text3)">Koi active client nahi</td></tr>'}</tbody>
    </table></div>
    <div class="print-footer"><span>Total Monthly Outflow</span><span style="color:var(--primary)">₹${fmt(total)}</span></div>`;
}

function doSearch() {
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const el=document.getElementById('search-results');
  if(!q){el.innerHTML='';return;}
  const found=clients.filter(c=>c.name.toLowerCase().includes(q)||c.cert.toLowerCase().includes(q));
  if(!found.length){el.innerHTML='<div class="empty">Koi nahi mila</div>';return;}
  const slabL={'1-10':'15–20th next month','11-20':'25–30th next month','21-30':'5–10th next to next'};
  el.innerHTML=found.map(c=>{
    const{paid,left}=getStatus(c); const pct=Math.round(paid/c.totalMonths*100);
    return`<div class="client-card">
      <div class="client-name">${c.name}</div>
      <div class="client-cert">${c.cert} · ${slabL[c.slab]}</div>
      <div class="chips"><span class="chip chip-blue">₹${fmt(c.amount)}</span><span class="chip chip-green">₹${fmt(c.monthly)}/mo</span></div>
      <div style="display:flex;gap:20px;margin:10px 0">
        <div><div style="font-size:11px;color:var(--text2)">Months Paid</div><div style="font-size:22px;font-weight:800;color:var(--primary)">${paid}</div></div>
        <div><div style="font-size:11px;color:var(--text2)">Months Left</div><div style="font-size:22px;font-weight:800;color:${left<=2?'var(--red)':'var(--text)'}">${left}</div></div>
        <div><div style="font-size:11px;color:var(--text2)">Total Paid</div><div style="font-size:22px;font-weight:800;color:var(--green)">₹${fmt(c.monthly*paid)}</div></div>
      </div>
      <div class="progress-bg" style="height:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderAll(){ renderDashboard(); renderClients(); renderCompleted(); renderPrint(); }

function showTab(name,el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(el) el.classList.add('active');
  if(name==='dashboard') renderDashboard();
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
